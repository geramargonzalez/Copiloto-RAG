version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: copiloto-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copiloto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d copiloto"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:

